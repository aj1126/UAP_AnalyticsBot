name: Auto-Add PR to Project

on:
  pull_request:
    types: [opened, reopened]

jobs:
  add-to-project:
    name: Add PR to Project
    runs-on: ubuntu-latest
    steps:
      - name: Send to Project Board
        uses: actions/add-to-project@v1.0.2
        with:
          # REPLACE this with your actual GitHub Project URL
          project-url: https://github.com/users/aj1126/projects/1
          # This requires a custom secret, not the default GITHUB_TOKEN
          github-token: ${{ secrets.PROJECT_PAT }}